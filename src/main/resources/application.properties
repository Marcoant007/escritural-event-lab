# PostgreSQL
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.username=escritural
%dev.quarkus.datasource.password=escritural
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/escritural_event_lab

# Dev Services (perfil de teste) usa Testcontainers; a imagem default (postgres:18)
# falha com "exec format error" neste ambiente, então fixamos a mesma imagem do docker-compose.
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.validate-on-migrate=true

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.hibernate-orm.log.sql=true

# Kafka
kafka.bootstrap.servers=localhost:9092
